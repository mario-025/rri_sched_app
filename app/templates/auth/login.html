<!DOCTYPE html>
<html>

<head>
    <title>Login - Sistem Jadwal Kerja</title>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 0.9rem;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: none;
        }

        .card-header {
            border-radius: 12px 12px 0 0 !important;
            padding: 1.5rem 1.25rem !important;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        }

        .card-header h2 {
            font-weight: 700;
            margin-bottom: 0.25rem;
            font-size: 1.25rem;
        }

        .card-header p {
            margin: 0;
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .card-body {
            padding: 1.5rem 1.25rem;
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #333;
            font-size: 0.85rem;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 0.6rem;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-submit {
            border-radius: 8px;
            padding: 0.6rem;
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
            margin-top: 0.4rem;
            font-size: 0.85rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8rem;
        }

        .form-check {
            margin: 0.8rem 0;
            font-size: 0.9rem;
        }

        .form-check-input {
            width: 1rem;
            height: 1rem;
            margin-top: 0.25rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: #667eea;
            border-color: #667eea;
        }

        .form-check-label {
            margin-left: 0.4rem;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="card shadow-lg">
            <!-- Header -->
            <div class="card-header text-white">
                <h2 class="mb-0">
                    <i class="fas fa-calendar-check me-2"></i>Sistem Jadwal Kerja
                </h2>
                <p class="text-white-50 mb-0">Login Dashboard</p>
            </div>

            <!-- Body -->
            <div class="card-body">
                <!-- Flash Messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            <i class="fas fa-exclamation-circle me-2"></i>{{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <!-- Unified Login Form -->
                <form method="POST" action="{{ url_for('auth.login') }}">
                    
                    <!-- Username -->
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-1"></i>Username
                        </label>
                        <input 
                            type="text" 
                            class="form-control form-control-lg" 
                            id="username" 
                            name="username"
                            placeholder="Masukkan username Anda"
                            required
                            autofocus
                        >
                        <small class="text-muted">Username untuk Admin atau Pegawai</small>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-1"></i>Password
                        </label>
                        <input 
                            type="password" 
                            class="form-control form-control-lg" 
                            id="password" 
                            name="password"
                            placeholder="Masukkan password"
                            required
                        >
                    </div>

                    <!-- Remember Me -->
                    <div class="form-check mb-3">
                        <input 
                            class="form-check-input" 
                            type="checkbox" 
                            id="remember" 
                            name="remember"
                        >
                        <label class="form-check-label" for="remember">
                            Ingat saya
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        class="btn btn-primary btn-submit btn-lg w-100"
                    >
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
            </div>
        </div>

        <!-- Footer -->
        <p class="footer-text">
            <i class="fas fa-shield-alt me-1"></i>Sistem Manajemen Jadwal Kerja - Powered by Flask
        </p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
