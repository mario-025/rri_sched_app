# docker-compose.prod.yml - Production Configuration
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sched_app_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_TCP_PORT: ${DB_PORT}
    ports:
      - "127.0.0.1:${DB_PORT}:${DB_PORT}"  # Only localhost access
    volumes:
      - /data/mysql:/var/lib/mysql          # Use external data directory
    networks:
      - sched_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASSWORD}"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 30s
    # Limit resources
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    # Production MySQL settings
    command: --max_connections=1000 --default-storage-engine=InnoDB --innodb_buffer_pool_size=1G

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sched_app:latest
    container_name: sched_app_flask_prod
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: ${FLASK_PORT}
      FLASK_USE_RELOADER: 'false'
      
      DB_HOST: mysql
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_ENABLED: 'true'
      
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "127.0.0.1:${FLASK_PORT}:${FLASK_PORT}"  # Only localhost (behind Nginx)
    volumes:
      # NO source code mounting in production
      - /data/sched_app/logs:/app/logs        # Mount logs only
      - /data/sched_app/uploads:/app/uploads  # Mount uploads only
    networks:
      - sched_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${FLASK_PORT}/health"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 40s
    # Limit resources
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  sched_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
