version: '3.8'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: sched_app_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-rritmb}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apppassword}
      MYSQL_TCP_PORT: ${DB_PORT:-3306}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      # Persist database files even after container is stopped
      - mysql_data:/var/lib/mysql
      # (Optional) Run initialization scripts
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - sched_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    environment:
      MYSQL_ROOT_HOST: '%'

  # Flask Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sched_app_flask
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # Flask Configuration
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: ${FLASK_PORT:-5000}
      FLASK_USE_RELOADER: ${FLASK_USE_RELOADER:-false}
      
      # Database Configuration
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-rritmb}
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-apppassword}
      
      # Telegram Bot
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      
      # Application Secret
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
    ports:
      - "${APP_PORT:-5000}:5000"
    volumes:
      # Mount aplikasi untuk development (optional, remove untuk production)
      - .:/app
      # Exclude volume mount untuk dependencies agar tidak conflict
      - /app/venv
    networks:
      - sched_network
    command: python run.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 40s

# Define volumes untuk persist data
volumes:
  mysql_data:
    driver: local

# Define networks
networks:
  sched_network:
    driver: bridge
